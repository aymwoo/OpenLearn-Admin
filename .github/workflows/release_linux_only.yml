name: Release-Linux-Only

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-linux:
    name: Build Linux Binary
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    
    env:
      # 强制使用 Node 24 解决你图片中提到的弃用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 安装 Tauri v2 必须的 Linux 系统库
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # 2. 设置前端环境 (使用你偏好的 pnpm)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 3. 设置 Rust 环境
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 4. 安装项目依赖
      - name: Install project dependencies
        run: pnpm install

      # 5. 执行构建并发布
      # 注意：使用了 v0 版本，它能自动处理 Tauri v2 的构建逻辑
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }} (Linux)"
          releaseBody: "Linux build successful."
          releaseDraft: false
          prerelease: false
