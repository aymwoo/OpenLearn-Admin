name: Release (Windows Only)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)，留空则使用 commit SHA'
        required: false
        default: ''

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: pnpm install

      # 使用 NSIS 打包，避免 WiX/MSI 的 light.exe 错误
      - name: Build Tauri App
        run: pnpm tauri build --bundles nsis

      # 确定版本号和时间戳
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $input = "${{ github.event.inputs.version }}"
          if ($input -ne "") {
            $ver = $input
          } else {
            $ver = "${{ github.sha }}".Substring(0, 7)
          }
          $ts = Get-Date -Format "yyyyMMddHHmm"
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TIMESTAMP=$ts" >> $env:GITHUB_OUTPUT
          echo "版本号: $ver"
          echo "时间戳: $ts"

      # 生成 NSIS 安装包 Release
      - name: Upload NSIS Installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Openlearn-Manager-${{ steps.version.outputs.TIMESTAMP }}"
          name: "Openlearn-Manager-${{ steps.version.outputs.TIMESTAMP }}"
          body: |
            ## Windows 安装包

            - **NSIS 安装程序**: 标准安装包，双击运行即可安装
            - **Full ZIP 绿色包**: 包含完整运行环境（SQL Server、.NET、Web服务器），适合离线部署
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 生成包含完整环境的绿色压缩包
      - name: Create Windows Full ZIP
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $pkgName = "OpenLearn-Admin-v$ver-Windows-Full"
          New-Item -ItemType Directory -Path $pkgName

          # 复制主程序 (Cargo 编译产物名为 app.exe)
          Copy-Item "src-tauri/target/release/app.exe" -Destination "$pkgName/OpenLearn-Admin.exe"

          # 复制环境资产
          Copy-Item -Recurse "assets-windows" -Destination "$pkgName/"

          # 压缩
          Compress-Archive -Path "$pkgName/*" -DestinationPath "$pkgName.zip"

          echo "PACKAGE_PATH=$pkgName.zip" >> $env:GITHUB_ENV
          echo "生成完整包: $pkgName.zip"

      - name: Upload Windows Full ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Openlearn-Manager-${{ steps.version.outputs.TIMESTAMP }}"
          files: ${{ env.PACKAGE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
