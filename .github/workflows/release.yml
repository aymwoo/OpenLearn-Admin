name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.platform }}${{ matrix.variant && format(' {0}', matrix.variant) || '' }})
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
          - platform: windows-latest
            variant: online
          - platform: windows-latest
            variant: full

    runs-on: ${{ matrix.platform }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      WINDOWS_FULL_NODE_MSI_NAME: node-v24.15.0-x64.msi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=release-${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: pnpm install

      - name: Verify Node.js MSI for full bundle (Windows)
        if: matrix.platform == 'windows-latest' && matrix.variant == 'full'
        shell: bash
        run: |
          MSI_PATH="src-tauri/resources/nodejs/${WINDOWS_FULL_NODE_MSI_NAME}"
          if [ ! -f "$MSI_PATH" ]; then
            echo "Missing Windows full Node.js MSI: $MSI_PATH"
            echo "Expected contract: src-tauri/resources/nodejs/*.msi 直接作为 bundle 资产"
            exit 1
          fi
          echo "Windows full bundle MSI verified: resources/nodejs/${WINDOWS_FULL_NODE_MSI_NAME}"

      - name: Build Linux
        if: matrix.platform == 'ubuntu-24.04'
        run: pnpm tauri build --bundles deb

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: src-tauri/target/release/bundle/deb/
          retention-days: 1

      - name: Build Windows online
        if: matrix.platform == 'windows-latest' && matrix.variant == 'online'
        run: pnpm tauri build --bundles nsis

      - name: Upload Windows online artifacts
        if: matrix.platform == 'windows-latest' && matrix.variant == 'online'
        uses: actions/upload-artifact@v4
        with:
          name: windows-online-bundle
          path: src-tauri/target/release/bundle/nsis/
          retention-days: 1

      - name: Build Windows Full variant
        if: matrix.platform == 'windows-latest' && matrix.variant == 'full'
        env:
          TAURI_CONFIG: '{"bundle":{"resources":["resources/nodejs"]}}'
        run: pnpm tauri build --bundles nsis,msi

      - name: Rename and upload Windows Full assets
        if: matrix.platform == 'windows-latest' && matrix.variant == 'full'
        shell: bash
        run: |
          cd src-tauri/target/release/bundle

          for dir in msi nsis; do
            if [ -d "$dir" ]; then
              cd "$dir"
              for f in *; do
                if [ -f "$f" ]; then
                  new_name=$(echo "$f" | sed 's/^OpenLearn Manager_/OpenLearn Manager Full_/')
                  if [ "$f" != "$new_name" ]; then
                    mv "$f" "$new_name"
                    echo "Renamed: $f -> $new_name"
                  fi
                fi
              done
              cd ..
            fi
          done

      - name: Upload Windows Full artifacts
        if: matrix.platform == 'windows-latest' && matrix.variant == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: windows-full-bundle
          path: src-tauri/target/release/bundle/
          retention-days: 1

  publish:
    name: create-release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "OpenLearn Manager $TAG_NAME" \
            --notes "See the assets below."

          for dir in artifacts/*; do
            if [ -d "$dir" ]; then
              for f in "$dir"/*; do
                if [ -f "$f" ]; then
                  echo "Uploading: $f"
                  gh release upload "$TAG_NAME" "$f" --clobber
                fi
              done
            fi
          done
