name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: release (${{ matrix.platform }})
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-24.04
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.platform }}
    
    env:
      # 解决图片中的 Node.js 20 弃用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux 依赖 (针对 Tauri v2 进行了精简和确认)
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # 使用 pnpm (v9 是当前前沿版本)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 升级到 Node.js 22 (LTS) 或 23 (Current)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # Rust 环境准备
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # 针对不同平台添加编译目标
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: pnpm install

      # 关键修改：使用适配 Tauri v2 的 Action 版本
      - name: Build Tauri App
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--bundle nsis"
          # 自动触发发布逻辑
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: "See the assets below. For Windows, use the 'Full' package if you need offline installers."
          releaseDraft: false
          prerelease: false

      # 针对 Windows 生成包含环境包的特殊压缩包
      - name: Create Windows Full ZIP
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("v", "")
          $pkgName = "OpenLearn-Admin-v$version-Windows-Full"
          New-Item -ItemType Directory -Path $pkgName
          
          # 自动获取产品名称并复制主程序
          $config = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $binName = $config.productName
          Copy-Item "src-tauri/target/release/$binName.exe" -Destination "$pkgName/OpenLearn-Admin.exe"
          
          # 复制环境资产
          Copy-Item -Recurse "assets-windows" -Destination "$pkgName/"
          
          # 复制启动脚本 (如果根目录有的话，或者直接使用 exe)
          # Copy-Item "assets-windows/启动.bat" -Destination "$pkgName/"
          
          # 压缩
          Compress-Archive -Path "$pkgName/*" -DestinationPath "$pkgName.zip"
          
          echo "PACKAGE_PATH=$pkgName.zip" >> $env:GITHUB_ENV

      - name: Upload Windows Full ZIP
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE_PATH }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
