name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: release (${{ matrix.platform }}${{ matrix.variant && format(' {0}', matrix.variant) || '' }})
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
          - platform: macos-latest
          - platform: windows-latest
            variant: online
          - platform: windows-latest
            variant: full

    runs-on: ${{ matrix.platform }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=release-${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: pnpm install

      - name: Copy Node.js MSI for full bundle (Windows)
        if: matrix.platform == 'windows-latest' && matrix.variant == 'full'
        run: |
          mkdir -p src-tauri/resources/nodejs
          cp src-tauri/assets-windows/node-v24.15.0-x64.msi src-tauri/resources/nodejs/
          echo "Node.js MSI copied successfully."

      - name: Build (standard targets)
        if: matrix.variant != 'full'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: "OpenLearn Manager ${{ steps.tag.outputs.value }}"
          releaseBody: "See the assets below."
          releaseDraft: false
          prerelease: false

      - name: Build Windows Full variant
        if: matrix.platform == 'windows-latest' && matrix.variant == 'full'
        env:
          TAURI_CONFIG: '{"bundle":{"resources":["resources/nodejs/node-v24.15.0-x64.msi"]}}'
        run: pnpm tauri build --bundles nsis,msi

      - name: Rename and upload Windows Full assets
        if: matrix.platform == 'windows-latest' && matrix.variant == 'full'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src-tauri/target/release/bundle

          for dir in msi nsis; do
            if [ -d "$dir" ]; then
              cd "$dir"
              for f in *; do
                if [ -f "$f" ]; then
                  new_name=$(echo "$f" | sed 's/^OpenLearn Manager_/OpenLearn Manager Full_/')
                  if [ "$f" != "$new_name" ]; then
                    mv "$f" "$new_name"
                    echo "Renamed: $f -> $new_name"
                  fi
                fi
              done
              cd ..
            fi
          done

          gh release create "${{ steps.tag.outputs.value }}" \
            --title "OpenLearn Manager ${{ steps.tag.outputs.value }}" \
            --notes "See the assets below." || true

          for dir in msi nsis; do
            if [ -d "$dir" ]; then
              for f in "$dir"/*; do
                if [ -f "$f" ]; then
                  echo "Uploading: $f"
                  gh release upload "${{ steps.tag.outputs.value }}" "$f" --clobber
                fi
              done
            fi
          done
